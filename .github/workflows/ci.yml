name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore PackageDeliverySystem.sln

      - name: Build
        run: dotnet build PackageDeliverySystem.sln -c Release --no-restore

      - name: Test
        run: dotnet test PackageDeliverySystem.sln -c Release --no-build --verbosity normal

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: docker compose build
        env:
          SA_PASSWORD: Ci_Test_Passw0rd_123!
          JWT_KEY: ci-jwt-secret-key-for-github-actions-build-only
          JWT_ISSUER: IdentityService
          JWT_AUDIENCE: PackageDeliverySystem
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
